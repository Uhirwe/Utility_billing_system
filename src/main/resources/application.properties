# =============================================================================
# Utility Billing System - Application Configuration
# =============================================================================

spring.application.name=utility-billing-system
spring.config.import=optional:classpath:application-local.properties

# -----------------------------------------------------------------------------
# PostgreSQL DataSource
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/utility_billing_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------------
# Pagination (Swagger uses page=1 for first page)
# -----------------------------------------------------------------------------
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------------
# JWT Configuration
# -----------------------------------------------------------------------------
jwt.secret=UtilityBillingSystemSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024!
jwt.expiration-ms=86400000

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.port=8080
server.servlet.context-path=/api

# -----------------------------------------------------------------------------
# Swagger / OpenAPI
# -----------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.com.utilitybilling=INFO
logging.level.org.springframework.security=WARN

# -----------------------------------------------------------------------------
# Email — see application-local.properties for Gmail credentials
# provider options:
#   smtp-with-fallback = try Gmail, print email in console if SMTP fails (default)
#   console            = always print in IntelliJ console (no Gmail needed)
#   smtp               = Gmail only, no fallback
# -----------------------------------------------------------------------------
app.mail.provider=smtp-with-fallback
app.mail.validate-on-startup=false
app.login-url=http://localhost:8080/api/swagger-ui.html
